name: croploo
description: "Croploo — AI-Powered Commodity Market Intelligence Terminal"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Charts
  fl_chart: ^0.68.0

  # Icons
  phosphor_flutter: ^2.1.0

  # Utilities
  intl: ^0.19.0

  # Networking
  http: ^1.2.2
  url_launcher: ^6.3.1

  # Real interactive map (OpenStreetMap tiles, no API key) for the Basis
  # Monitor's map view, alongside the existing zero-dependency terminal
  # scatter view.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Multi-window desktop support (separate native login window)
  desktop_multi_window: ^0.2.1

  # Persisted login (local cache, not Keychain)
  shared_preferences: ^2.3.2
  local_notifier: ^0.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# Local override: patched to hide the native macOS title bar and traffic lights
# for secondary windows created by desktop_multi_window.
dependency_overrides:
  desktop_multi_window:
    path: vendor/desktop_multi_window

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/google_fonts/
    - assets/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # see https://flutter.dev/to/font-from-package

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/google_fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/Poppins-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/google_fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/google_fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/google_fonts/JetBrainsMono-SemiBold.ttf
          weight: 600
        - asset: assets/google_fonts/JetBrainsMono-Bold.ttf
          weight: 700
