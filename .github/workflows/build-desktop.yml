name: Build desktop releases

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Build macOS release
        run: ./build-macos-dmg.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: croploo-macos
          path: dist/croploo-macos-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows release
        shell: bash
        run: ./build-windows.sh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: croploo-windows
          path: dist/croploo-windows-*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libnotify-dev libfuse2

      - name: Install appimagetool
        run: |
          curl -L -o /usr/local/bin/appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'

      - name: Build Linux release
        run: ./build-linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: croploo-linux
          path: |
            dist/croploo-linux-*.tar.gz
            dist/croploo-linux.AppImage

  publish-downloads:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Copy builds into website/downloads with stable names
        run: |
          mkdir -p website/downloads
          cp artifacts/croploo-macos/croploo-macos-*.dmg website/downloads/croploo-macos.dmg

          WIN_SETUP=$(ls artifacts/croploo-windows/croploo-windows-setup.exe 2>/dev/null | head -1 || true)
          if [[ -n "$WIN_SETUP" ]]; then
            cp "$WIN_SETUP" website/downloads/croploo-windows-setup.exe
          else
            echo "Warning: no Windows installer .exe found in artifacts." >&2
          fi

          LINUX_APPIMAGE=$(ls artifacts/croploo-linux/croploo-linux.AppImage 2>/dev/null | head -1 || true)
          if [[ -n "$LINUX_APPIMAGE" ]]; then
            cp "$LINUX_APPIMAGE" website/downloads/croploo-linux.AppImage
          else
            echo "Warning: no Linux AppImage found in artifacts." >&2
          fi

      - name: Commit and push updated downloads
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/downloads
          if git diff --cached --quiet; then
            echo "No changes to downloads"
          else
            git commit -m "chore: update website downloads [skip ci]"
            for i in 1 2 3 4 5; do
              git push && break
              echo "Push rejected, rebasing onto latest main (attempt $i)..."
              git fetch origin main
              git rebase origin/main
            done
          fi

  deploy-website:
    needs: publish-downloads
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: croploo-website
          entryPoint: website
          channelId: live

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
